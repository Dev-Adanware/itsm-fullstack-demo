services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/data/itsm.db
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/incidents/statistics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite-data:
